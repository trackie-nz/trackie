name: Release

# Builds the SHIPPING image - the one that carries our client (UI) changes as well
# as the sync-server overlay - and publishes it to ghcr.io.
#
# Philosophy mirrors upstream's docker-release.yml: compile the JS on the runner,
# then copy the prebuilt artifacts into a slim runtime image (app/release.Dockerfile)
# rather than running the ~8GB `build:browser` React compile inside Docker.
#
# amd64 only (the target servers are x86), ghcr.io only (no Docker Hub). The image
# is boot + HTTP smoke-tested BEFORE it is pushed, and gets a build-provenance
# attestation after the push.

on:
  workflow_dispatch:
  push:
    tags:
      # Release tags encode both version axes: <upstream-base>-trackie.<overlay-rev>,
      # e.g. 26.6.0-trackie.3. The base must match ACTUAL_VERSION (enforced below).
      - '*-trackie.*'

env:
  # ACTUAL_VERSION is loaded from app/version.env in the first step (single
  # source of truth, also read by ci.yml and the scripts).
  NODE_OPTIONS: '--max_old_space_size=8192'
  # Skip native binaries the server image never needs (~400 MB, faster install).
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Both required by actions/attest-build-provenance.
      id-token: write
      attestations: write

    steps:
      - name: Checkout overlay repo
        uses: actions/checkout@v6

      - name: Load ACTUAL_VERSION (single source of truth)
        run: grep '^ACTUAL_VERSION=' app/version.env >> "$GITHUB_ENV"

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Enable Corepack (upstream uses Yarn 4)
        run: corepack enable

      - name: Clone upstream actual at the pinned tag
        run: |
          git clone --depth 1 --branch "v${ACTUAL_VERSION}" \
            https://github.com/actualbudget/actual.git actual

      - name: Apply the Trackie overlay (drift detector - fails on upstream drift)
        run: sh app/apply-overlay.sh "$PWD/actual"

      - name: Inject the Trackie theme CSS from trackie-nz/trackie-theme
        run: node app/inject-theme.mjs "$PWD/actual"

      - name: Install dependencies
        working-directory: actual
        run: yarn install --immutable || yarn install

      - name: Build the web client (with our patches)
        working-directory: actual
        run: yarn build:browser

      - name: Build the sync-server
        working-directory: actual
        run: yarn workspace @actual-app/sync-server build

      - name: Trim to production deps and graft the built web client in
        working-directory: actual
        # Same final assembly as server-fullbuild.Dockerfile's builder stage, but
        # done on the runner so release.Dockerfile only has to copy artifacts.
        run: |
          yarn workspaces focus @actual-app/sync-server --production
          rm -rf ./node_modules/@actual-app/web ./node_modules/@actual-app/sync-server
          mkdir -p ./node_modules/@actual-app/web
          cp ./packages/desktop-client/package.json ./node_modules/@actual-app/web/package.json
          cp -r ./packages/desktop-client/build ./node_modules/@actual-app/web/build
          cp "$GITHUB_WORKSPACE/app/entrypoint.sh" ./entrypoint.sh
          rm -f ./.dockerignore

      - name: Resolve image name and tags
        id: image
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          ref="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          # Moving convenience pointers, always applied.
          tags="-t ${ref}:${ACTUAL_VERSION} -t ${ref}:latest"
          # On a tag push, add the immutable per-release tag (the git tag itself).
          # workflow_dispatch runs from a branch and only refreshes the moving tags.
          if [ "$REF_TYPE" = "tag" ]; then
            case "$REF_NAME" in
              "${ACTUAL_VERSION}-trackie."*) ;;
              *) echo "::error::Tag '$REF_NAME' must be '${ACTUAL_VERSION}-trackie.N' (ACTUAL_VERSION=${ACTUAL_VERSION}). Bump ACTUAL_VERSION or fix the tag."; exit 1 ;;
            esac
            tags="$tags -t ${ref}:${REF_NAME}"
            echo "immutable=${ref}:${REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build release image (no compile - copies prebuilt artifacts)
        run: docker build -f app/release.Dockerfile ${{ steps.image.outputs.tags }} actual

      - name: Boot + HTTP smoke (before any push)
        run: |
          docker run -d --name trackie -p 5006:5006 \
            -e NODE_ENV=production -e ACTUAL_IDENTITY_SECRET=ci-smoke-secret \
            "${{ steps.image.outputs.ref }}:${ACTUAL_VERSION}"
          for _ in $(seq 1 30); do curl -fsS http://localhost:5006/health >/dev/null && break || sleep 2; done
          echo "health:"; curl -fsS http://localhost:5006/health; echo
          echo "owner-created bootstrap (allowlisted, must be 200):"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5006/admin/owner-created/)" = 200
          echo "GET /admin/users without a session (deny-by-default gateway, must be 401):"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5006/admin/users/)" = 401
          echo "smoke passed"

      - name: Cross-user budget isolation smoke (bob cannot see alice)
        # Gate the shipped artifact on ordinary-user budget isolation. Shared with
        # ci.yml's image-smoke; runs against the container booted in the step above.
        run: sh app/test/isolation-smoke.sh

      - name: Container logs on smoke failure
        if: failure()
        run: docker logs trackie || true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to ghcr.io
        id: push
        env:
          IMMUTABLE: ${{ steps.image.outputs.immutable }}
        run: |
          docker push "${{ steps.image.outputs.ref }}:${ACTUAL_VERSION}"
          docker push "${{ steps.image.outputs.ref }}:latest"
          [ -n "$IMMUTABLE" ] && docker push "$IMMUTABLE"
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' \
            "${{ steps.image.outputs.ref }}:${ACTUAL_VERSION}" | cut -d@ -f2)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Released: ${IMMUTABLE:-${{ steps.image.outputs.ref }}:${ACTUAL_VERSION}} @ $digest" >> "$GITHUB_STEP_SUMMARY"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.image.outputs.ref }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
