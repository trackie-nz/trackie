# Self-hosted NZ Actual Budget (privacy sign-in + /get-started deep link +
# per-user NZ bank sync via Akahu).
#
# Then:  cp .env.example .env  (fill in OIDC creds)
#        docker compose pull && docker compose up -d   (or podman-compose)
# See README.md for the full walkthrough.

services:
  server:
    image: ghcr.io/trackie-nz/trackie:${TRACKIE_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "5006:5006"
    volumes:
      - ${DATA_PATH:-./data}:/data
    environment:
      NODE_ENV: production
      # --- self-service signup ---
      ACTUAL_LOGIN_METHOD: openid
      ACTUAL_OPENID_ENFORCE: "true"          # everyone in via the IdP; no password login
      ACTUAL_USER_CREATION_MODE: login       # auto-provision any IdP-authenticated user
      ACTUAL_OPENID_DISCOVERY_URL: ${OIDC_DISCOVERY_URL}
      ACTUAL_OPENID_CLIENT_ID: ${OIDC_CLIENT_ID}
      ACTUAL_OPENID_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      ACTUAL_OPENID_SERVER_HOSTNAME: ${SERVER_HOSTNAME}
      # Sessions expire 90 days after login (value is in seconds), so a leaked
      # session token is not valid forever. Upstream applies it as now + N at
      # login; existing "never" sessions keep going until the user next signs in.
      ACTUAL_TOKEN_EXPIRATION: 7776000   # 90 days
      # --- Identity: HMAC key for user_name. Generate once; NEVER rotate
      #     (rotating orphans every existing user from their budget). ---
      ACTUAL_IDENTITY_SECRET: ${ACTUAL_IDENTITY_SECRET}
      # --- Akahu NZ bank sync: each user pastes their own my.akahu.nz personal
      #     tokens, encrypted at rest with this key. Distinct from the identity
      #     secret. If rotated/lost, stored tokens become undecryptable and users
      #     simply re-paste (no budget data is lost). ---
      ACTUAL_AKAHU_TOKEN_SECRET: ${ACTUAL_AKAHU_TOKEN_SECRET}
      # --- Server timezone: transaction dates are bucketed in local time, so pin
      #     it to NZ so a late-evening transaction lands on the right NZ day. ---
      TZ: Pacific/Auckland
